appId: com.melodix.player
productName: Melodix Player
directories: { output: release, buildResources: build }
files: [dist/**/*, package.json]
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  certificateFile: ''
  certificatePassword: ''
  sign: false
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.music
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Audio